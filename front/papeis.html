<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papéis e Permissões - MedInsight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/modern.css">
    <style>
        .table-container {
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        tr:hover td {
            background: var(--glass-bg);
        }

        .role-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo"
                style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                MedInsight AI
            </div>
            <nav id="menu" class="nav-menu"></nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                <div id="userEmail" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;"></div>
                <button onclick="logout()" class="btn btn-primary" style="width: 100%;">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.875rem; font-weight: 700;">Gestão de Papéis</h1>
                <button id="btnNovoPapel" class="btn btn-primary" style="display: none;" onclick="openRoleModal()">+ Novo Papel</button>
            </header>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>PAPEL</th>
                                <th>DESCRIÇÃO</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="papeisTable">
                            <!-- Carregado via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- MODAL NOVO PAPEL -->
        <div id="roleModal" class="modal"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
            <div class="card" style="max-width:500px; width:90%;">
                <h2 style="margin-bottom:1.5rem;">Novo Papel</h2>
                <form id="roleForm" style="display:grid; gap:1.2rem;">
                    <div>
                        <label
                            style="display:block; font-size:0.875rem; color:var(--text-muted); margin-bottom:0.5rem;">Nome
                            do Papel</label>
                        <input type="text" name="nome" required
                            style="width:100%; padding:0.75rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); border-radius:0.5rem; color:white;">
                    </div>
                    <div>
                        <label
                            style="display:block; font-size:0.875rem; color:var(--text-muted); margin-bottom:0.5rem;">Descrição</label>
                        <input type="text" name="descricao"
                            style="width:100%; padding:0.75rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); border-radius:0.5rem; color:white;">
                    </div>
                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button type="button" onclick="closeRoleModal()" class="btn"
                            style="flex:1; background:var(--glass-bg);">Cancelar</button>
                        <button type="submit" class="btn btn-primary" style="flex:1;">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL PERMISSOES -->
        <div id="permModal" class="modal"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
            <div class="card" style="max-width:600px; width:90%; max-height:80vh; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <h2>Permissões: <span id="targetRoleName"></span></h2>
                    <button onclick="closePermModal()" class="btn btn-sm">Fechar</button>
                </div>
                <div id="permsList" style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                    <!-- Carregado via JS -->
                </div>
                <button onclick="salvarPermissoes()" class="btn btn-primary"
                    style="width:100%; margin-top:1.5rem;">Salvar Permissões</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/createPermissionChecker.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        let currentRoleId = null;

        async function carregarPapeis() {
            await carregarUsuario(); // Ensure user permissions are loaded

            const btnNovo = document.getElementById('btnNovoPapel');
            if (btnNovo && temPermissao('papel', 'criar')) {
                btnNovo.style.display = 'inline-block';
            }

            try {
                const response = await fetch(`${API_URL}/papeis`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                const result = await response.json();
                const roles = result.dados || [];
                const tabela = document.getElementById("papeisTable");
                tabela.innerHTML = "";

                roles.forEach(role => {
                    const tr = document.createElement("tr");
                    
                    const nomePapel = role.nome.toUpperCase();
                    let botoes = '';

                    if (temPermissao('papel', 'editar')) {
                        botoes += `<button class="btn btn-primary btn-sm" onclick="abrirPermissoes(${role.id}, '${role.nome}')">Permissões</button> `;
                    }

                    if (nomePapel !== 'ADMIN' && nomePapel !== 'PACIENTE' && temPermissao('papel', 'deletar')) {
                        botoes += `<button class="btn btn-sm" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="excluirPapel(${role.id}, '${role.nome}')">Excluir</button>`;
                    }

                    tr.innerHTML = `
                        <td><span class="role-badge">${role.nome}</span></td>
                        <td>${role.descricao || 'Sem descrição'}</td>
                        <td class="actions">
                            ${botoes}
                        </td>
                    `;
                    tabela.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao carregar papéis", error);
            }
        }

        function openRoleModal() { document.getElementById('roleModal').style.display = 'flex'; }
        function closeRoleModal() { document.getElementById('roleModal').style.display = 'none'; }

        document.getElementById('roleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch(`${API_URL}/papeis`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeRoleModal();
                    carregarPapeis();
                } else {
                    alert("Erro ao criar papel.");
                }
            } catch (err) { console.error(err); }
        });

        async function abrirPermissoes(roleId, roleName) {
            currentRoleId = roleId;
            document.getElementById('targetRoleName').innerText = roleName;
            document.getElementById('permModal').style.display = 'flex';

            try {
                // 1. Load all available permissions
                const resAll = await fetch(`${API_URL}/permissoes`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const allResult = await resAll.json();
                const allPerms = allResult.dados || [];

                // 2. Load permissions for this role
                const resRole = await fetch(`${API_URL}/papeis/permissoes/${roleId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                let roleResult = {};
                try {
                    roleResult = await resRole.json();
                } catch (e) { console.error("Erro ao processar JSON de permissões do papel", e); }
                
                const myPerms = (roleResult && roleResult.dados ? roleResult.dados : []).map(p => Number(p.id));

                const list = document.getElementById('permsList');
                list.innerHTML = "";
                allPerms.forEach(p => {
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; align-items:center; gap:0.5rem; padding:0.5rem; background:rgba(255,255,255,0.05); border-radius:0.5rem;";
                    div.innerHTML = `
                        <input type="checkbox" value="${p.id}" ${myPerms.includes(Number(p.id)) ? 'checked' : ''} class="perm-check">
                        <label style="font-size:0.75rem;">${p.nome}</label>
                    `;
                    list.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }
        async function excluirPapel(roleId, roleName) {
            const confirmar = confirm(`Tem certeza que deseja excluir o papel "${roleName}"?`);

            if (!confirmar) return;

            try {
                const response = await fetch(`${API_URL}/papeis/${roleId}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    }
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result?.mensagem || "Erro ao excluir papel");
                }

                alert("Papel excluído com sucesso!");

                // 🔄 Atualiza lista (ajuste conforme sua função)
                if (typeof carregarPapeis === "function") {
                    carregarPapeis();
                }

            } catch (err) {
                console.error(err);
                alert("Erro ao excluir papel");
            }
        }

        function closePermModal() { document.getElementById('permModal').style.display = 'none'; }

        async function salvarPermissoes() {
            const checks = document.querySelectorAll('.perm-check:checked');
            const permIds = Array.from(checks).map(c => c.value);

            try {
                const res = await fetch(`${API_URL}/papeis/permissoes/${currentRoleId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ papel: currentRoleId, permissoes: permIds })
                });
                if (res.ok) {
                    alert("Permissões atualizadas!");
                    closePermModal();
                } else {
                    const result = await res.json();
                    alert("Erro ao salvar permissões: " + (result.erro || "Verifique os logs ou a conexão."));
                }
            } catch (err) { 
                console.error(err); 
                alert("Erro catastrófico ao salvar permissões. Verifique o console.");
            }
        }

        carregarPapeis();
    </script>
</body>

</html>
