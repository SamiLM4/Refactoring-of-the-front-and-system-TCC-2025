<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médicos - MedInsight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/modern.css">
    <style>
        .table-container { overflow-x: auto; margin-top: 1.5rem; }
        table { width: 100%; border-collapse: collapse; color: var(--text-main); }
        th { text-align: left; padding: 1rem; color: var(--text-muted); font-size: 0.875rem; border-bottom: 1px solid var(--border-color); }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; }
        tr:hover td { background: var(--glass-bg); }
        .actions { display: flex; gap: 0.5rem; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
        .specialty-badge { padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; background: var(--glass-bg); color: var(--primary); font-weight: 500; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                MedInsight AI
            </div>
            <nav id="menu" class="nav-menu"></nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                <div id="userEmail" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;"></div>
                <button onclick="logout()" class="btn btn-primary" style="width: 100%;">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.875rem; font-weight: 700;">Médicos</h1>
                <button id="btnNovoMedico" class="btn btn-primary" style="display: none;" onclick="window.location.href='medico_form.html'">+ Novo Médico</button>
            </header>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>NOME</th>
                                <th>CRM</th>
                                <th>ESPECIALIDADE</th>
                                <th>EMAIL</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="medicosTable">
                            <!-- Carregado via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/createPermissionChecker.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        async function carregarMedicos() {
            await carregarUsuario();

            const btnNovo = document.getElementById('btnNovoMedico');
            if (btnNovo && temPermissao('medico', 'criar')) {
                btnNovo.style.display = 'inline-block';
            }

            try {
                const response = await fetch(`${API_URL}/medicos`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                const result = await response.json();
                const tabela = document.getElementById("medicosTable");
                tabela.innerHTML = "";

                const medicos = result.dados || [];
                medicos.forEach(m => {
                    const tr = document.createElement("tr");

                    let botoes = '';
                    if (temPermissao('medico', 'editar')) {
                        botoes += `<button class="btn btn-primary btn-sm" onclick="editarMedico(${m.id})">Editar</button> `;
                    }
                    if (temPermissao('medico', 'deletar')) {
                        botoes += `<button class="btn btn-sm" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="deletarMedico(${m.id})">Excluir</button>`;
                    }

                    tr.innerHTML = `
                        <td>
                            <div style="font-weight: 600;">${m.nome}</div>
                        </td>
                        <td>${m.crm || '-'}</td>
                        <td><span class="specialty-badge">${m.especialidade || 'Clínico Geral'}</span></td>
                        <td>${m.email}</td>
                        <td class="actions">
                            ${botoes}
                        </td>
                    `;
                    tabela.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao carregar médicos", error);
            }
        }

        function editarMedico(id) {
            window.location.href = `medico_form.html?id=${id}`;
        }

        async function deletarMedico(id) {
            if (!confirm("Deseja realmente excluir este médico?")) return;
            try {
                const res = await fetch(`${API_URL}/medicos/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + token }
                });
                if (res.ok) {
                    carregarMedicos();
                } else {
                    alert("Erro ao excluir médico.");
                }
            } catch (error) {
                alert("Erro ao excluir médico");
            }
        }

        carregarMedicos();
    </script>
</body>
</html>
