<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuário - MedInsight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/modern.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div class="card" style="max-width: 600px; width: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 id="formTitle" style="font-size: 1.5rem; font-weight: 700;">Novo Usuário do Sistema</h1>
            <button onclick="history.back()" class="btn" style="background: var(--glass-bg); color: var(--text-muted); font-size: 0.875rem;">Voltar</button>
        </div>
        
        <form id="usuarioForm" style="display: grid; gap: 1.5rem;">
            <div>
                <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Nome Completo</label>
                <input type="text" name="nome" required style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
            </div>
            <div>
                <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Email de Acesso</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
            </div>
            <div>
                <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">CPF</label>
                <input type="text" name="cpf" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
            </div>
            <div id="passwordField">
                <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Senha (deixe em branco para manter)</label>
                <input type="password" name="senha" required style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
            </div>
            <div>
                <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Papel / Permissão</label>
                <select id="papelSelect" name="papel_id" required style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                    <option value="">Carregando papéis...</option>
                </select>
            </div>
            
            <div id="extraFields" style="display: none; gap: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <div id="crmField" style="display:none;">
                    <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">CRM</label>
                    <input type="text" name="crm" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                </div>

                <!-- Patient Specific Fields -->
                <div id="pacienteFields" style="display:none; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Sexo</label>
                        <select name="sexo" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                            <option value="">Selecione</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                            <option value="O">Outro</option>
                        </select>
                    </div>
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Telefone</label>
                        <input type="text" name="telefone" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                    </div>
                    <div style="grid-column: span 2;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Endereço</label>
                        <textarea name="endereco" rows="2" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;"></textarea>
                    </div>
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Profissão</label>
                        <input type="text" name="profissao" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                    </div>
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Estado Civil</label>
                        <select name="estado_civil" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                            <option value="">Selecione</option>
                            <option value="Solteiro">Solteiro(a)</option>
                            <option value="Casado">Casado(a)</option>
                            <option value="Divorciado">Divorciado(a)</option>
                            <option value="Viúvo">Viúvo(a)</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Nome do Cuidador</label>
                        <input type="text" name="nome_cuidador" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                    </div>
                    <div style="grid-column: span 1;">
                        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Telefone do Cuidador</label>
                        <input type="text" name="telefone_cuidador" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 0.5rem; color: white;">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Criar Usuário</button>
        </form>
    </div>

    <script>
        const API_URL = "../api";
        const token = localStorage.getItem("access_token");

        let roles = [];

        async function loadRoles() {
            try {
                const res = await fetch(`${API_URL}/papeis`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await res.json();
                roles = result.dados || [];
                const select = document.getElementById('papelSelect');
                select.innerHTML = '<option value="">Selecione um papel</option>';
                roles.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    opt.innerText = r.nome;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Erro ao carregar papéis", err);
            }
        }

        document.getElementById('papelSelect').addEventListener('change', (e) => {
            const roleId = e.target.value;
            const role = roles.find(r => r.id == roleId);
            
            console.log("Selecionou papel:", roleId, role ? role.nome : "não encontrado");

            const extraFields = document.getElementById('extraFields');
            const crmField = document.getElementById('crmField');
            const pacienteFields = document.getElementById('pacienteFields');
            
            extraFields.style.display = 'none';
            crmField.style.display = 'none';
            pacienteFields.style.display = 'none';
            
            if (role && role.nome) {
                const roleName = role.nome.toUpperCase().trim();
                console.log("Normalizado:", roleName);

                if (roleName === 'MEDICO') {
                    extraFields.style.display = 'grid';
                    crmField.style.display = 'block';
                } else if (roleName === 'PACIENTE') {
                    extraFields.style.display = 'grid';
                    pacienteFields.style.display = 'grid';
                    console.log("Exibindo campos de paciente");
                }
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        async function loadUserData() {
            if (!userId) return;
            
            document.getElementById('formTitle').innerText = "Editar Usuário";
            document.getElementById('submitBtn').innerText = "Salvar Alterações";
            document.getElementsByName('senha')[0].removeAttribute('required');
            
            try {
                const res = await fetch(`${API_URL}/usuarios/${userId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await res.json();
                console.log("Dados carregados para edição:", result);
                if (!result.status || !result.dados) {
                    console.error("Erro ao carregar dados:", result.msg);
                    return;
                }
                const u = result.dados;
                
                // Top-level fields
                const setFieldValue = (name, value) => {
                    const el = document.getElementsByName(name)[0];
                    if (el) el.value = value || '';
                };

                // Determine the best name to show (Profile priority)
                const nameToSet = (u.paciente && u.paciente.nome) || (u.admin && u.admin.nome) || u.nome || '';

                setFieldValue('nome', nameToSet);
                setFieldValue('email', u.email);
                setFieldValue('cpf', u.cpf || (u.paciente && u.paciente.cpf) || '');
                setFieldValue('crm', u.crm);
                
                if (u.papel_id) {
                    const select = document.getElementById('papelSelect');
                    select.value = u.papel_id;
                    console.log("Definindo papel_id:", u.papel_id, "Novo Valor:", select.value);
                    // Trigger role change logic
                    select.dispatchEvent(new Event('change'));
                }

                // Profile-specific fields (fill remaining even if name was already set)
                if (u.paciente) {
                    const p = u.paciente;
                    console.log("Populando dados de paciente:", p);
                    setFieldValue('sexo', p.sexo);
                    setFieldValue('telefone', p.telefone);
                    setFieldValue('endereco', p.endereco);
                    setFieldValue('profissao', p.profissao);
                    setFieldValue('estado_civil', p.estado_civil);
                    setFieldValue('nome_cuidador', p.nome_cuidador);
                    setFieldValue('telefone_cuidador', p.telefone_cuidador);
                }

                if (u.admin) {
                     console.log("Populando dados de admin:", u.admin);
                     // Admin primarily uses name which is already handled above
                }

            } catch (err) {
                console.error("Erro ao carregar dados do usuário", err);
            }
        }

        document.getElementById('usuarioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            const method = userId ? 'PUT' : 'POST';
            const url = userId ? `${API_URL}/usuarios/${userId}` : `${API_URL}/usuarios`;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    alert(result.msg || (userId ? "Usuário atualizado com sucesso!" : "Usuário criado com sucesso!"));
                    window.location.href = 'usuarios.html';
                } else {
                    const errorMsg = (result.dados && result.dados.msg) || result.msg || result.erro || "Desconhecido";
                    alert("Erro ao processar usuário: " + errorMsg);
                }
            } catch (err) {
                alert("Erro ao processar usuário");
            }
        });

        async function init() {
            await loadRoles();
            await loadUserData();
        }

        init();
    </script>
</body>
</html>
