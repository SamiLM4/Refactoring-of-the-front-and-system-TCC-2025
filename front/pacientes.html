<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - MedInsight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/modern.css">
    <style>
        .table-container {
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        tr:hover td {
            background: var(--glass-bg);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo"
                style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                MedInsight AI
            </div>
            <nav id="menu" class="nav-menu"></nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                <div id="userEmail" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;"></div>
                <button onclick="logout()" class="btn btn-primary" style="width: 100%;">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.875rem; font-weight: 700;">Pacientes</h1>
                <button id="btnNovoPaciente" class="btn btn-primary" style="display: none;" onclick="window.location.href='paciente_form.html'">+ Novo Paciente</button>
            </header>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>NOME</th>
                                <th>CPF</th>
                                <th>EMAIL</th>
                                <th>TELEFONE</th>
                                <th>STATUS</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="pacientesTable">
                            <!-- Carregado via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/createPermissionChecker.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        async function carregarPacientes() {
            await carregarUsuario(); // Ensure user permissions are loaded

            const btnNovo = document.getElementById('btnNovoPaciente');
            if (btnNovo && temPermissao('paciente', 'criar')) {
                btnNovo.style.display = 'inline-block';
            }

            try {
                const response = await fetch(`${API_URL}/pacientes`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                const result = await response.json();
                const tabela = document.getElementById("pacientesTable");
                tabela.innerHTML = "";

                const pacientes = result.dados || [];
                pacientes.forEach(p => {
                    const tr = document.createElement("tr");

                    let botoes = '';
                    if (temPermissao('paciente', 'editar')) {
                        botoes += `<button class="btn btn-primary btn-sm" onclick="editarPaciente(${p.id})">Editar</button> `;
                    }
                    if (temPermissao('paciente', 'deletar')) {
                        botoes += `<button class="btn btn-sm" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="deletarPaciente(${p.id})">Excluir</button>`;
                    }

                    tr.innerHTML = `
                        <td>
                            <div style="font-weight: 600;">${p.nome}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">${p.email || 'Sem email'}</div>
                        </td>
                        <td>${p.cpf}</td>
                        <td>${p.email || '-'}</td>
                        <td>${p.telefone || '-'}</td>
                        <td><span class="status-badge status-active">Ativo</span></td>
                        <td class="actions">
                            ${botoes}
                        </td>
                    `;
                    tabela.appendChild(tr);
                });
            } catch (error) {
                console.error("Erro ao carregar pacientes", error);
            }
        }

        function editarPaciente(id) {
            window.location.href = `paciente_form.html?id=${id}`;
        }

        async function deletarPaciente(id) {
            if (!confirm("Deseja realmente excluir este paciente?")) return;
            try {
                const res = await fetch(`${API_URL}/pacientes/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + token }
                });
                if (res.ok) {
                    carregarPacientes();
                } else {
                    alert("Erro ao excluir paciente.");
                }
            } catch (error) {
                alert("Erro ao excluir paciente");
            }
        }

        carregarPacientes();
    </script>
</body>

</html>
