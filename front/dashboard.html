<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo"
                style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                MedInsight AI
            </div>
            <nav id="menu" class="nav-menu"></nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                <div id="userEmail" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;"></div>
                <button onclick="logout()" class="btn btn-primary" style="width: 100%;">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="navbar"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.875rem; font-weight: 700;">Visão Geral</h1>
                <div class="date-now" id="currentDate" style="color: var(--text-muted);"></div>
            </header>

            <div class="carousel-container" id="roles-carousel">
                <button id="carousel-prev" class="carousel-btn">&#10094;</button>
                <div class="carousel-track-container">
                    <ul class="carousel-track" id="roles-track">
                        <!-- role slides dynamically loaded here -->
                    </ul>
                </div>
                <button id="carousel-next" class="carousel-btn">&#10095;</button>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                <div class="chart-container card">
                    <h3 style="margin-bottom: 1.5rem;">Atividade de Diagnósticos</h3>
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Distribuição por Sexo</h3>
                    <canvas id="genderChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/createPermissionChecker.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
