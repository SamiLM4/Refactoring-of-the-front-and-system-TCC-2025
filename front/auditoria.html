<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria do Sistema - MedInsight AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/modern.css">
    <style>
        .table-container {
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        tr:hover td {
            background: var(--glass-bg);
        }

        .action-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .search-container {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: white;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo"
                style="font-size: 1.5rem; font-weight: 700; margin-bottom: 2.5rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                MedInsight AI
            </div>
            <nav id="menu" class="nav-menu"></nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                <div id="userEmail" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem;"></div>
                <button onclick="logout()" class="btn btn-primary" style="width: 100%;">Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700;">Auditoria do Sistema</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Histórico completo de ações realizadas na plataforma.</p>
                </div>
            </header>

            <div class="card">
                <div class="search-container">
                    <input type="text" id="auditSearch" placeholder="Buscar por usuário, ação ou descrição..." class="search-input">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>DATA/HORA</th>
                                <th>USUÁRIO</th>
                                <th>AÇÃO</th>
                                <th>DESCRIÇÃO</th>
                                <th>PACIENTE</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody id="auditoriaTable">
                            <!-- Carregado via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/createPermissionChecker.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/auditoria.js"></script>
</body>

</html>
